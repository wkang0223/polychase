name: Build Wheel

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        run: docker build -f ./docker/Dockerfile.linux . -t polychase || docker build -f ./docker/Dockerfile.linux . -t polychase
      - name: Extract wheel
        run: |
          docker cp polychase:/work/polychase-src/wheelhouse/. ./wheels 2>/dev/null || true
          ls -la wheels/ 2>/dev/null || echo "Build may have failed - check logs"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: wheels
          path: ./wheels/*.whl